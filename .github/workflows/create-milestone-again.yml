name: Create Milestone Again

on:
  workflow_dispatch:

jobs:
  create-milestone:
    runs-on: ubuntu-latest
    steps:
      - name: Create v1.0.0 milestone
        uses: actions/github-script@v7
        with:
          script: |
            const milestone = await github.rest.issues.createMilestone({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'v1.0.0'
            });
            console.log(`Milestone created: ${milestone.data.number}`);