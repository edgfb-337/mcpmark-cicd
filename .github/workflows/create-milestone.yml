name: Create Milestone

on:
  push:
    branches: [ main ]

jobs:
  create-milestone:
    runs-on: ubuntu-latest
    steps:
      - name: Create v1.0.0 milestone
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.createMilestone({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'v1.0.0'
              });
            } catch (error) {
              if (error.status !== 422) {
                throw error;
              }
            }